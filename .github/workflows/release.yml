name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest from tag
        run: node scripts/sync-update-manifest.mjs "${{ github.ref_name }}"

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/manifest.json
          git diff --staged --quiet || git commit -m "chore: sync update manifest for ${{ github.ref_name }}"
          git push
